# Gilly Slack app — paste at api.slack.com/apps → Create New App → From a manifest.
# Uses the AI assistant surface (not plain @mentions). Socket Mode = no public URL.
# After creating: generate an app-level token with `connections:write` (SLACK_APP_TOKEN),
# then Install to Workspace and copy the Bot User OAuth Token (SLACK_BOT_TOKEN).
display_information:
  name: Gilly
features:
  bot_user:
    display_name: Gilly
    always_online: true
  app_home:
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  assistant_view:
    assistant_description: A coding agent at your service.
    suggested_prompts: []
oauth_config:
  scopes:
    bot:
      - assistant:write # assistant.threads.* (status, prompts, title)
      - chat:write # post replies
      - im:history # read messages in the assistant thread
      - app_mentions:read # receive @mentions in channels
settings:
  event_subscriptions:
    bot_events:
      - assistant_thread_started
      - assistant_thread_context_changed
      - message.im
      - app_mention
  socket_mode_enabled: true
  interactivity:
    is_enabled: false
