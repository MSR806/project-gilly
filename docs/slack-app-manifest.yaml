# Gilly Slack app manifest. Paste at api.slack.com/apps → your app → App Manifest,
# then Reinstall to Workspace (the *:history + reactions:write scopes require it).
# Socket Mode = no public URL. App-level token needs `connections:write` (SLACK_APP_TOKEN);
# Bot User OAuth Token = SLACK_BOT_TOKEN.
display_information:
  name: gilly
  description: Always working cloud agent
  background_color: "#000d63"
features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: false
    messages_tab_read_only_enabled: true
  bot_user:
    display_name: gilly-dev
    always_online: true
oauth_config:
  scopes:
    bot:
      - chat:write
      - app_mentions:read
      - reactions:write # ack/queued/done reactions
      - channels:history # thread context in public channels
      - channels:read # resolve public channel metadata
      - groups:history # thread context in private channels
      - groups:read # resolve private channel metadata
      - users:read # resolve Slack user ids in logs
  pkce_enabled: false
settings:
  event_subscriptions:
    bot_events:
      - app_mention
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  is_mcp_enabled: false
