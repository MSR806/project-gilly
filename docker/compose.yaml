# One-command local stack: harness + control-plane + web.
# Each service loads its own app .env via env_file; compose only overrides the
# handful of values that must differ inside the Docker network (service
# hostnames, container paths). Paths here are relative to this file (docker/).
services:
  harness:
    build:
      context: ..
      dockerfile: docker/Dockerfile.harness
    env_file:
      - ../apps/harness-claude/.env   # ANTHROPIC_API_KEY (and optional PORT)
    ports:
      - "8080:8080"

  control-plane:
    build:
      context: ..
      dockerfile: docker/Dockerfile.control-plane
    depends_on:
      - harness
      - gateway
    env_file:
      - ../apps/control-plane/.env    # GILLY_VAULT_KEY (required), WEB_PORT, ...
    environment:
      # Override .env values that only make sense on the host, not in-network.
      # (environment wins over env_file.)
      HARNESS_URL: http://harness:8080
      GILLY_GATEWAY_URL: http://gateway:4100
      AGENTS_DIR: /app/config/agents
      SKILLS_DIR: /app/config/skills
      DATABASE_PATH: /data/gilly.db
    volumes:
      - ../config:/app/config:ro      # agent + skill JSON, read-only
      - gilly-data:/data              # SQLite store persists across runs
    ports:
      - "4000:4000"                   # WEB_PORT — keep in sync with apps/control-plane/.env

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    env_file:
      - ../apps/control-plane/.env    # GILLY_VAULT_KEY and GILLY_ADMIN_TOKEN
    environment:
      DATABASE_PATH: /data/gilly.db
      GILLY_GATEWAY_URL: http://gateway:4100
      GILLY_WEB_URL: http://localhost:3000
      GILLY_CONTROL_PLANE_URL: http://control-plane:4000
    volumes:
      - gilly-data:/data
    ports:
      - "4100:4100"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    depends_on:
      - control-plane
    env_file:
      - path: ../apps/web/.env        # optional today — web has no required env
        required: false
    environment:
      # Next.js rewrites /api/* to the control-plane over the Docker network.
      API_URL: http://control-plane:4000
    ports:
      - "3000:3000"

volumes:
  gilly-data:
